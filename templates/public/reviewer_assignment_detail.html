{% extends "base.html" %}
{% block content %}
<section class="py-5">
    <div class="container narrow-content">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">{{ assignment.submission.article_id }} Review</h1>
                <p><strong>Title:</strong> {{ assignment.submission.title }}</p>
                <p><strong>Authors:</strong> {{ assignment.submission.authors }}</p>
                <p><strong>Due date:</strong> {{ assignment.due_date|default:"Not set" }}</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary">Save Review Response</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
