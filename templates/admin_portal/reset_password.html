{% extends "base.html" %}
{% block content %}
<section class="py-5">
    <div class="container narrow-content">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-3">Reset Password with OTP</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
